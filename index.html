  <body>

    <!-- ═══════════════════════════════════════════════════════════════
         Splash screen — shown before React hydrates.
         Zero JS, zero dependency, pure CSS.
         Visible from the moment HTML paints (≈50ms on fast networks,
         faster on 4G) and disappears as soon as React is ready.
         ═══════════════════════════════════════════════════════════════ -->
    <div id="tv-splash" aria-hidden="true"
      style="position:fixed;inset:0;background:radial-gradient(ellipse at 50% 40%,rgba(139,92,246,0.18) 0%,rgba(26,15,43,0.98) 55%,#0d0718 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 400ms ease-out;opacity:1;">
      <style>
        @keyframes tvPulse { 0%,100% { transform: scale(1); opacity: 0.9 } 50% { transform: scale(1.08); opacity: 1 } }
        @keyframes tvSpin { 0% { transform: rotate(0deg) } 100% { transform: rotate(360deg) } }
        @keyframes tvFadeUp { 0% { opacity: 0; transform: translateY(8px) } 100% { opacity: 1; transform: translateY(0) } }
      </style>
      <svg width="64" height="64" viewBox="0 0 64 64" style="animation: tvPulse 1.8s ease-in-out infinite; color: rgba(196,181,253,0.9);">
        <circle cx="32" cy="32" r="30" fill="none" stroke="currentColor" stroke-opacity="0.2" stroke-width="1.5"/>
        <circle cx="32" cy="32" r="22" fill="none" stroke="currentColor" stroke-opacity="0.35" stroke-width="1"/>
        <path d="M22 22 L42 22 L32 32 Z M22 42 L42 42 L32 32 Z" fill="currentColor" fill-opacity="0.75" stroke="currentColor" stroke-width="1"/>
        <circle cx="32" cy="32" r="3.5" fill="currentColor" fill-opacity="0.9"/>
      </svg>
      <div style="margin-top:28px;color:rgba(233,213,255,0.85);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:17px;font-weight:300;letter-spacing:0.08em;animation:tvFadeUp 600ms ease-out 200ms both;">TimeVault</div>
      <div style="margin-top:10px;color:rgba(200,180,230,0.35);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:12px;letter-spacing:0.12em;animation:tvFadeUp 700ms ease-out 450ms both;">loading your letter…</div>
    </div>
    <script>
      window.__tvHideSplash = function () {
        var el = document.getElementById('tv-splash');
        if (!el) return;
        el.style.opacity = '0';
        setTimeout(function () {
          if (el && el.parentNode) el.parentNode.removeChild(el);
        }, 450);
      };
      // Safety: always hide after 5 seconds even if something goes wrong
      setTimeout(window.__tvHideSplash, 5000);
    </script>

    <script type="module" crossorigin src="./src/main.tsx"></script>
