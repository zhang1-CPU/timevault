<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>TimeVault — Seal a message, choose when it opens. A time capsule for two hearts.</title>
    <meta name="title" content="TimeVault — Seal a message, choose when it opens. A time capsule for two hearts." />
    <meta name="description" content="Write a secret message. Hide it inside any photo. Pick a future date. On that day — and only that day — it opens. End-to-end encrypted. Zero servers. Your photo holds the key." />
    <meta name="keywords" content="time capsule, time-lock, love letter, secret message, photo encryption, anniversary gift, future message, couple app, privacy, password steganography, drand, AES" />
    <meta name="author" content="TimeVault" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="language" content="English" />
    <meta name="theme-color" content="#1a0f2b" />
    <meta name="msapplication-TileColor" content="#1a0f2b" />

    <!-- Canonical -->
    <link rel="canonical" href="https://timevault.online/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://timevault.online/" />
    <meta property="og:site_name" content="TimeVault" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:title" content="TimeVault — Seal a message, choose when it opens. A time capsule for two hearts." />
    <meta property="og:description" content="Write a secret message. Hide it inside any photo. Pick a future date. On that day — and only that day — it opens." />
    <meta property="og:image" content="https://timevault.online/og-image.svg" />
    <meta property="og:image:secure_url" content="https://timevault.online/og-image.svg" />
    <meta property="og:image:type" content="image/svg+xml" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="TimeVault — write a letter to tomorrow and seal it in a photo until the chosen day." />

    <!-- PWA & Icons -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="image_src" href="/logo.svg" />

    <!-- JSON-LD Structured Data: WebSite + Organization + Product -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "TimeVault",
      "alternateName": "TimeVault Online",
      "url": "https://timevault.online/",
      "description": "Seal a message inside any photo and choose a future day when it can be opened. Time-locked messages for couples and meaningful future moments.",
      "inLanguage": "en"
    }
    </script>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Product",
      "name": "TimeVault Time Capsule",
      "description": "Seal a secret message inside a photo and time-lock it with cryptography. Opens only on the day you choose.",
      "url": "https://timevault.online/",
      "brand": { "@type": "Organization", "name": "TimeVault" },
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD",
        "availability": "https://schema.org/InStock"
      }
    }
    </script>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Is my message really hidden inside the photo?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. The encrypted message is embedded into the image file itself using steganography. Nothing is sent to any server."
          }
        },
        {
          "@type": "Question",
          "name": "Can I open it before the chosen day?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. Time-lock cryptography mathematically prevents decryption until the publicly-verifiable beacon rotates on your chosen date."
          }
        },
        {
          "@type": "Question",
          "name": "Is it really free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Completely free. No accounts, no subscriptions, no ads, no tracking. Your words live in your photo."
          }
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>

    <div id="tv-splash" aria-hidden="true"
      style="position:fixed;inset:0;background:radial-gradient(ellipse at 50% 40%,rgba(139,92,246,0.18) 0%,rgba(26,15,43,0.98) 55%,#0d0718 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 400ms ease-out;opacity:1;">
      <style>
        @keyframes tvPulse { 0%,100% { transform: scale(1); opacity: 0.9 } 50% { transform: scale(1.08); opacity: 1 } }
        @keyframes tvSpin { 0% { transform: rotate(0deg) } 100% { transform: rotate(360deg) } }
        @keyframes tvFadeUp { 0% { opacity: 0; transform: translateY(8px) } 100% { opacity: 1; transform: translateY(0) } }
      </style>
      <svg width="64" height="64" viewBox="0 0 64 64" style="animation: tvPulse 1.8s ease-in-out infinite; color: rgba(196,181,253,0.9);">
        <circle cx="32" cy="32" r="30" fill="none" stroke="currentColor" stroke-opacity="0.2" stroke-width="1.5"/>
        <circle cx="32" cy="32" r="22" fill="none" stroke="currentColor" stroke-opacity="0.35" stroke-width="1"/>
        <path d="M22 22 L42 22 L32 32 Z M22 42 L42 42 L32 32 Z" fill="currentColor" fill-opacity="0.75" stroke="currentColor" stroke-width="1"/>
        <circle cx="32" cy="32" r="3.5" fill="currentColor" fill-opacity="0.9"/>
      </svg>
      <div style="margin-top:28px;color:rgba(233,213,255,0.85);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:17px;font-weight:300;letter-spacing:0.08em;animation:tvFadeUp 600ms ease-out 200ms both;">TimeVault</div>
      <div style="margin-top:10px;color:rgba(200,180,230,0.35);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:12px;letter-spacing:0.12em;animation:tvFadeUp 700ms ease-out 450ms both;">sealing your words…</div>
    </div>
    <script>
      window.__tvHideSplash = function () {
        var el = document.getElementById('tv-splash');
        if (!el) return;
        el.style.opacity = '0';
        setTimeout(function () {
          if (el && el.parentNode) el.parentNode.removeChild(el);
        }, 450);
      };
      setTimeout(window.__tvHideSplash, 5000);
    </script>

    <script type="module" crossorigin src="/src/main.tsx"></script>
  </body>
</html>
