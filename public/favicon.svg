<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0f2b"/>
      <stop offset="100%" stop-color="#0a0612"/>
    </linearGradient>
    <linearGradient id="sand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8c8d8"/>
      <stop offset="50%" stop-color="#c9a8e8"/>
      <stop offset="100%" stop-color="#b5c8f0"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e11d48" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- Soft circular halo -->
  <circle cx="32" cy="32" r="30" fill="url(#glow)"/>
  <circle cx="32" cy="32" r="28" fill="url(#bg)" stroke="url(#sand)" stroke-width="1.2" stroke-opacity="0.5"/>

  <!-- Hourglass frame -->
  <line x1="20" y1="12" x2="44" y2="12" stroke="url(#sand)" stroke-width="2" stroke-linecap="round"/>
  <line x1="20" y1="52" x2="44" y2="52" stroke="url(#sand)" stroke-width="2" stroke-linecap="round"/>
  <line x1="20" y1="12" x2="34" y2="32" stroke="url(#sand)" stroke-width="1.8" stroke-linejoin="round"/>
  <line x1="44" y1="12" x2="30" y2="32" stroke="url(#sand)" stroke-width="1.8" stroke-linejoin="round"/>
  <line x1="20" y1="52" x2="34" y2="32" stroke="url(#sand)" stroke-width="1.8" stroke-linejoin="round"/>
  <line x1="44" y1="52" x2="30" y2="32" stroke="url(#sand)" stroke-width="1.8" stroke-linejoin="round"/>

  <!-- Sand in upper chamber -->
  <path d="M 22 14 L 42 14 L 34 30 L 30 30 Z" fill="url(#sand)" opacity="0.85"/>
  <!-- Sand in lower chamber (small pile) -->
  <path d="M 28 34 L 36 34 L 42 50 L 22 50 Z" fill="url(#sand)" opacity="0.55"/>
  <!-- Falling sand stream -->
  <line x1="32" y1="30" x2="32" y2="34" stroke="#f5c8a0" stroke-width="1.2" opacity="0.9"/>
  <circle cx="32" cy="32" r="0.9" fill="#f5c8a0" opacity="0.95"/>
</svg>
